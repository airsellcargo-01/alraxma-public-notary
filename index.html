<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Airsell Cargo Customer Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f8f9fa;
    }
    .page {
      max-width: 800px;
      margin: auto;
      border: 2px solid #002850;
      background: #fff;
    }
    /* Header */
    .header {
      background: #002850;
      color: #fff;
      padding: 20px;
      border-bottom: 4px solid #00aaff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { margin: 0; }
    .contact { font-size: 0.9em; text-align: right; }
    /* Body */
    .content {
      padding: 30px;
    }
    .content label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #002850;
    }
    .content input, .content textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea { height: 120px; }
    /* Footer */
    .footer {
      background: #eee;
      text-align: center;
      padding: 15px;
      border-top: 2px solid #00aaff;
      font-size: 0.85em;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <div class="header">
      <h1>AIRSELL CARGO</h1>
      <div class="contact">
        Hargeisa Airport (HGA) & Berbera Port (BBO)<br>
        📞 +252 63 333 3453<br>
        ✉️ info@airsellcargo.com
      </div>
    </div>

    <!-- Body Form -->
    <div class="content">
      <h2>Customer Communication Form</h2>
      <label for="date">Date:</label>
      <input type="text" id="date" placeholder="DD/MM/YYYY">

      <label for="to">To:</label>
      <input type="text" id="to" placeholder="Customer Name">

      <label for="subject">Subject:</label>
      <input type="text" id="subject" placeholder="Subject of Message">

      <label for="message">Message:</label>
      <textarea id="message" placeholder="Write your message here..."></textarea>
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2024 Airsell Cargo | Connecting Somaliland to the World
    </div>
  </div>
</body>
</html>
